<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>

    <style>

        body {
            align-items: center;
            justify-content: center;
            display: flex;
            height: 100vh;
            width: 100%;
            background-color: rgb(253, 255, 152);
        }

        .content
        {
            background-color: rgb(8, 191, 204);
            border-radius: 5vw;
            padding: 3%;
            font-size: 1.5vw;
            min-width: 30%;
            text-align: center;
            align-items: center;
            display: flex;
            flex-direction: column;
        }

        .title
        {
            font-size: 250%;
            font-weight: bold;
            margin: 1vw;
        }

        .links
        {
            background-color: rgb(8, 66, 173);
            border-radius: 1vw;
            max-width: 30vw;
            align-items: center;
            justify-content: center;
            padding: 0.5vw;
            margin-top: 3vw;
        }

        .color a
        {
            color: rgb(21, 231, 133)
        }

        p
        {
            margin: 0.5vw;
        }

        form {width: 100%;}

        .input
        {
            margin-top: 1vw;
            margin-bottom: 1vw;
            padding: 1vw;
            font-size: 80%;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            justify-content: left;
            text-align: left;
            background-color: rgb(20, 145, 37);
            border-radius: 1.5vw;
            max-width: 100%;
            border: 0px;
        }

    </style>
</head>
<body>

    <div class="content">

        {% block content %}{% endblock %}

        <form method='POST' action={% block dest %}{% endblock %}>
            {% block input %}{% endblock %}
            <input class="input" type="submit" value="Submit">
        </form>

        {% if msg %}
            <div class="content">{{ msg }}</div>
        {% endif %}

        <div class="links color">
            {% for page in pages %}
                {% if page not in request.endpoint %}
                    <a href="{{ page }}">{{ page }}</a>
                {% endif %}
            {% endfor %}
        </div>

    </div>

</body>
</html>
