<!DOCTYPE html>
<html lang="en">


<head>
    <style type="text/css">

        body {
            background-color: rgb(67, 104, 95);
        }

        .all {
            align-items: center;
            justify-content: center;
            display: flex;
            width: 100%;
            height: 100vh;
        }
        
        .centering {
            justify-content: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 5vw;
            background-color: aquamarine;
            border-radius: 5vw;
            width: 75vw;
            height: 50vh;
            
        }

        .over {
            padding: 0.3vw;
            margin: 0 1vw;
            border-radius: 1vw;
            background-color: rgb(15, 19, 43);
        }
        
        button {
            justify-content: center;
            display: flex;
            align-items: center;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            border-radius: 1vw;
            background-color: rgb(45, 41, 112);
            font-size: 3vw;
            color: white;
            padding: 0.5vw;
        }

        .flex {display: flex;}

        .margin {margin: 2vw;}

        a {text-decoration: none;}

    </style>

</head>


<body>

    <div class="all">
        <div class="centering">
            <h1 class="flex margin">SKIBIDI.PT</h1>
            <div class="flex margin">
                {% for page in pages %}
                    <div class="over">
                        <a href="{{ page }}">
                            <button>{{ page }}</button>
                        </a>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>

</body>
</html>
