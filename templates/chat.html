<!DOCTYPE html>
<html lang="en">


<head>
    <style type="text/css">

        body {
            background-color: rgb(100, 120, 200);
            margin: 0;
        }

        .centering {
            justify-content: center;
            display: flex;
            align-items: center;
            min-width: 100vw;
            background-color: red;
        }

        button {
            justify-content: center;
            display: flex;
            align-items: center;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            border-radius: 1vw;
            background-color: rgb(45, 41, 112);
            font-size: 2.5vw;
            color: white;
            padding: 0.5vw;
            margin: 0 0.5vw;
        }

        .buttons {
            justify-content: center;
            display: flex;
            align-items: end;
        }

        h1 {font-size: 5vw;}

        .important { color: #336699; }

        p {font-size: 2vw;}

    </style>
</head>


<body>

    <div id="content">
        <div class="centering">
            <h1>Welcome to the chatroom!</h1>
        </div>
        <form>
            <input type="txt" id="message" name="message">
            <input type="button" value="ENVIAR" onclick="sendMessage()">
        </form>
        <p class="important"><div id="messageDiv"></div></p>
        <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"
            integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"
            crossorigin="anonymous">
        </script>
        <script>
            const socket = io("http://192.168.1.190:3001");

            socket.on("connect", () => {

                socket.emit("msg", "Hello")

            });

            socket.on("newMessage", (data) => {
                //message.push(message);
                console.log(data);
                const messageDiv = document.getElementById("messageDiv");
                const newMessage = document.createElement("p");
                newMessage.innerText = data.nick + ": " + data.message;
                messageDiv.appendChild(newMessage);
            });

            function sendMessage() {
                const messageInput = document.getElementById("message");
                let messageInpuText = messageInput.value;
                console.log(messageInpuText);
                document.getElementById("message").value = "";
                const Myself = {
                    nick: "{{ username }}",
                    message: messageInpuText

                }
                socket.emit("message", Myself);
            }
        </script>
    </div>

    <div class="buttons">
        {% for page in pages %}
            <a href="{{ page }}">
                <button>{{ page }}</button>
            </a>
        {% endfor %}
    </div>



</body>
</html>
