<!DOCTYPE html>
<html lang="en">


<head>

    <title>{% block title %}{% endblock %} - My Webpage</title>
</head>


<body>

    {% for page in pages %}

    {% endfor %}

    <div id="content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
